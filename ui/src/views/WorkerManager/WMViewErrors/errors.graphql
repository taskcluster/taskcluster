query WorkerManagerErrors($workerPoolId: String, $errorsConnection: PageConnection, $launchConfigId: String) {
  WorkerManagerErrors(workerPoolId: $workerPoolId, launchConfigId: $launchConfigId, connection: $errorsConnection) {
    pageInfo {
      hasNextPage
      hasPreviousPage
      cursor
      previousCursor
      nextCursor
    }
    edges {
      node {
        errorId
        title
        description
        reported
        extra
        launchConfigId
      }
    }
  }
  WorkerManagerErrorsStats(workerPoolId: $workerPoolId) {
    totals {
      total
      daily
      hourly
      title
      code
      launchConfig
    }
  }
}
