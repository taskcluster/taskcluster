query RoleIds($rolesConnection: PageConnection, $searchTerm: String) {
  listRoleIds(connection: $rolesConnection, searchTerm: $searchTerm) {
    pageInfo {
      hasNextPage
      hasPreviousPage
      cursor
      previousCursor
      nextCursor
    }
    edges {
      node {
        roleId
      }
    }
  }
}
