query DenylistedNotification($notificationsConnection: PageConnection, $searchTerm: String) {
  listDenylistAddresses(connection: $notificationsConnection, searchTerm: $searchTerm) {
    pageInfo {
      hasNextPage
      hasPreviousPage
      cursor
      previousCursor
      nextCursor
    }
    edges {
      node {
        notificationAddress
        notificationType
      }
    }
  }
}
