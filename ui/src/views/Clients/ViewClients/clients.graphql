query Clients($clientsConnection: PageConnection, $clientOptions: ClientsOptions, $searchTerm: String) {
  clients(connection: $clientsConnection, clientOptions: $clientOptions, searchTerm: $searchTerm) {
    pageInfo {
      hasNextPage
      hasPreviousPage
      cursor
      previousCursor
      nextCursor
    }
    edges {
      node {
        clientId
        lastDateUsed
      }
    }
  }
}
