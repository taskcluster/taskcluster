query ListWorkerPools($connection: PageConnection){
  WorkerManagerWorkerPoolSummaries(connection: $connection){
    edges{
      node{
        workerPoolId
        providerId
        pendingTasks
        currentCapacity
        requestedCount
        runningCount
        stoppingCount
        stoppedCount
        requestedCapacity
        runningCapacity
        stoppingCapacity
        stoppedCapacity
      }
    }
  }
}
