$schema: "/schemas/common/metaschema.json#"
title: "GitHub Push Webhook Payload"
description: |
  Validates GitHub push event webhook payload.

type: object
properties:
  ref:
    type: string
    pattern: "^refs/(heads|tags)/.*$"
  before:
    type: string
    pattern: "^[a-f0-9]{40}$"
  after:
    type: string
    pattern: "^[a-f0-9]{40}$"
  repository:
    type: object
    properties:
      full_name:
        type: string
        pattern: "^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$"
      clone_url:
        type: string
        format: uri
        pattern: "^https://github\\.com/"
      owner:
        type: object
        properties:
          name:
            type: string
            pattern: {$const: github-identifier-pattern}
        required: [name]
        additionalProperties: true
    required: [full_name, clone_url, owner]
    additionalProperties: true
  pusher:
    type: object
    properties:
      name:
        type: string
        minLength: 1
    required: [name]
    additionalProperties: true
  head_commit:
    oneOf:
      - type: "null"
      - type: object
        properties:
          id:
            type: string
            pattern: "^[a-f0-9]{40}$"
          message:
            type: string
        required: [id, message]
        additionalProperties: true
  commits:
    type: array
    items:
      type: object
      properties:
        id:
          type: string
          pattern: "^[a-f0-9]{40}$"
        message:
          type: string
      required: [id, message]
      additionalProperties: true
  installation:
    type: object
    properties:
      id:
        type: integer
        minimum: 1
    required: [id]
    additionalProperties: true
  sender:
    type: object
    properties:
      login:
        type: string
        pattern: {$const: github-identifier-pattern}
    required: [login]
    additionalProperties: true
required: [ref, before, after, repository, pusher, commits, installation, sender]
additionalProperties: true
