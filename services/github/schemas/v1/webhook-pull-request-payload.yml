$schema: "/schemas/common/metaschema.json#"
title: "GitHub Pull Request Webhook Payload"
description: |
  Validates GitHub pull request event webhook payload.
  Strictly validates fields that caused issues in PR #7958.

type: object
properties:
  action:
    type: string
    enum: ["opened", "closed", "reopened", "synchronize", "edited"]
  number:
    type: integer
    minimum: 1
  pull_request:
    type: object
    properties:
      number:
        type: integer
        minimum: 1
      state:
        type: string
        enum: ["open", "closed"]
      title:
        type: string
      head:
        type: object
        properties:
          sha:
            type: string
            pattern: "^[a-f0-9]{40}$"
          ref:
            type: string
            minLength: 1
          repo:
            type: object
            properties:
              name:
                type: string
                pattern: "^[A-Za-z0-9._-]+$"
              full_name:
                type: string
                pattern: "^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$"
              clone_url:
                type: string
                format: uri
                pattern: "^https://github\\.com/"
              owner:
                type: object
                properties:
                  login:
                    type: string
                    pattern: {$const: github-identifier-pattern}
                required: [login]
                additionalProperties: true
            required: [name, full_name, clone_url, owner]
            additionalProperties: true
        required: [sha, ref, repo]
        additionalProperties: true
      base:
        type: object
        properties:
          sha:
            type: string
            pattern: "^[a-f0-9]{40}$"
          ref:
            type: string
            minLength: 1
          repo:
            type: object
            properties:
              name:
                type: string
                pattern: "^[A-Za-z0-9._-]+$"
              full_name:
                type: string
                pattern: "^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$"
              clone_url:
                type: string
                format: uri
                pattern: "^https://github\\.com/"
              owner:
                type: object
                properties:
                  login:
                    type: string
                    pattern: {$const: github-identifier-pattern}
                required: [login]
                additionalProperties: true
            required: [name, full_name, clone_url, owner]
            additionalProperties: true
        required: [sha, ref, repo]
        additionalProperties: true
      user:
        type: object
        properties:
          login:
            type: string
            pattern: {$const: github-identifier-pattern}
        required: [login]
        additionalProperties: true
    required: [number, state, head, base, user]
    additionalProperties: true
  repository:
    type: object
    properties:
      full_name:
        type: string
        pattern: "^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$"
      owner:
        type: object
        properties:
          login:
            type: string
            pattern: {$const: github-identifier-pattern}
        required: [login]
        additionalProperties: true
    required: [full_name, owner]
    additionalProperties: true
  installation:
    type: object
    properties:
      id:
        type: integer
        minimum: 1
    required: [id]
    additionalProperties: true
  sender:
    type: object
    properties:
      login:
        type: string
        pattern: {$const: github-identifier-pattern}
    required: [login]
    additionalProperties: true
required: [action, number, pull_request, repository, installation, sender]
additionalProperties: true
