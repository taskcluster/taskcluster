$schema: "/schemas/common/metaschema.json#"
title: "GitHub Installation Webhook Payload"
description: |
  Validates GitHub installation event webhook payload.

type: object
properties:
  action:
    type: string
    enum: ["created", "deleted", "suspend", "unsuspend", "new_permissions_accepted"]
  installation:
    type: object
    properties:
      id:
        type: integer
        minimum: 1
      account:
        type: object
        properties:
          login:
            type: string
            pattern: {$const: github-identifier-pattern}
          id:
            type: integer
            minimum: 1
          type:
            type: string
            enum: ["User", "Organization"]
        required: [login, id, type]
        additionalProperties: true
      repository_selection:
        type: string
        enum: ["all", "selected"]
      target_id:
        type: integer
        minimum: 1
      target_type:
        type: string
        enum: ["User", "Organization"]
    required: [id, account, repository_selection, target_id, target_type]
    additionalProperties: true
  repositories:
    type: array
    items:
      type: object
      properties:
        id:
          type: integer
          minimum: 1
        name:
          type: string
          pattern: "^[A-Za-z0-9._-]+$"
        full_name:
          type: string
          pattern: "^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$"
      required: [id, name, full_name]
      additionalProperties: true
  sender:
    type: object
    properties:
      login:
        type: string
        pattern: {$const: github-identifier-pattern}
    required: [login]
    additionalProperties: true
required: [action, installation, sender]
additionalProperties: true
