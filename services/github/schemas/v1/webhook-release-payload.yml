$schema: "/schemas/common/metaschema.json#"
title: "GitHub Release Webhook Payload"
description: |
  Validates GitHub release event webhook payload.

type: object
properties:
  action:
    type: string
    enum: ["published", "unpublished", "created", "edited", "deleted", "prereleased", "released"]
  release:
    type: object
    properties:
      id:
        type: integer
        minimum: 1
      tag_name:
        type: string
        minLength: 1
      target_commitish:
        type: string
        minLength: 1
      name:
        oneOf:
          - type: "null"
          - type: string
      draft:
        type: boolean
      prerelease:
        type: boolean
      author:
        type: object
        properties:
          login:
            type: string
            pattern: {$const: github-identifier-pattern}
        required: [login]
        additionalProperties: true
    required: [id, tag_name, target_commitish, draft, prerelease, author]
    additionalProperties: true
  repository:
    type: object
    properties:
      full_name:
        type: string
        pattern: "^[A-Za-z0-9._-]+/[A-Za-z0-9._-]+$"
      owner:
        type: object
        properties:
          login:
            type: string
            pattern: {$const: github-identifier-pattern}
        required: [login]
        additionalProperties: true
    required: [full_name, owner]
    additionalProperties: true
  installation:
    type: object
    properties:
      id:
        type: integer
        minimum: 1
    required: [id]
    additionalProperties: true
  sender:
    type: object
    properties:
      login:
        type: string
        pattern: {$const: github-identifier-pattern}
    required: [login]
    additionalProperties: true
required: [action, release, repository, installation, sender]
additionalProperties: true
