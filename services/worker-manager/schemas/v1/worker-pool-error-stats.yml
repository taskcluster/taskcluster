$schema: "/schemas/common/metaschema.json#"
title: Worker Pool Error Stats
description: |
  Total number of errors for a given worker pool or all worker pools,
  broken down by day and by hour for the request's optional `from`/`to`
  range (defaulting to the last 7 days for daily totals and the last
  24 hours for hourly totals when omitted). Also includes breakdown by
  title and error code.
type: object
properties:
  workerPoolId:
    oneOf:
    - {$ref: "worker-pool-full.json#/properties/workerPoolId"}
    - const: ''
  totals:
    type: object
    properties:
      total:
        title: Total number of errors in the selected range
        type: number
        description: |
          Total number of errors in the request range (defaults to the
          last 7 days when `from`/`to` are omitted)
      daily:
        title: Daily breakdown
        description: |
          Breakdown by day for the request range (defaults to the last
          7 days when `from`/`to` are omitted)
        type: object
        additionalProperties: true
      hourly:
        title: Hourly breakdown
        description: |
          Breakdown by hour for the request range (defaults to the last
          24 hours when `from`/`to` are omitted). May be empty when the
          selected span exceeds 31 days.
        type: object
        additionalProperties: true
      title:
        title: By error title
        description: Breakdown by title
        type: object
        additionalProperties: true
      code:
        title: By error code
        description: Breakdown by error code where available
        type: object
        additionalProperties: true
      launchConfig:
        title: By launch config ID
        description: Breakdown by launchConfigId where available
        type: object
        additionalProperties: true
      workerPool:
        title: By worker pool
        description: |
          Breakdown by worker pool if workerPoolId is not specified.
          If specified, this will only include the worker pool specified.
        type: object
        additionalProperties: true
    additionalProperties: false
    required:
    - total
    - daily
    - hourly
    - title
    - code
    - launchConfig
    - workerPool
additionalProperties: false
required:
  - workerPoolId
  - totals
