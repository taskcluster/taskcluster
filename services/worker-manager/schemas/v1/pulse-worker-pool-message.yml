$schema: "/schemas/common/metaschema.json#"
title: WorkerType Pulse Message
description: The message that is emitted when worker pools are created/changed/deleted.
type: object
properties:
  workerPoolId: {$ref: "worker-pool-full.json#/properties/workerPoolId"}
  providerId: {$ref: "worker-pool-full.json#/properties/providerId"}
  previousProviderId:
    title: Previous Provider
    type: string
    minLength: {$const: identifier-min-length}
    maxLength: {$const: identifier-max-length}
    pattern: {$const: identifier-pattern}
    description: |
      If this is defined, it was the provider that handled this worker pool in the
      configuration before the current one. This will be used by providers to clean
      up any resources created for this workerType when they are no longer responsible
      for it.
  createdLaunchConfigs:
    title: Created Launch Configs
    description: |
      The launch configuration IDs that were created for this worker pool.
    type: array
    items: {$const: lc-id}
    uniqueItems: true
  updatedLaunchConfigs:
    title: Updated Launch Configs
    description: |
      The launch configuration IDs that were updated for this worker pool.
    type: array
    items: {$const: lc-id}
    uniqueItems: true
  archivedLaunchConfigs:
    title: Archived Launch Configs
    description: |
      The launch configuration IDs that were archived for this worker pool.
    type: array
    items: {$const: lc-id}
    uniqueItems: true

additionalProperties: false
required:
  - workerPoolId
  - providerId
