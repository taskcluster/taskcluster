name: Publish NPM Packages
on:
  release:
    types: [published]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish NPM packages
    runs-on: ubuntu-latest
    # Only run on the main repo, not forks or staging
    if: github.repository == 'taskcluster/taskcluster'
    permissions:
      id-token: write    # Required: OIDC token generation for NPM trusted publishing
      contents: read     # Required: download release assets
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          # registry-url is REQUIRED for trusted publishing — triggers setup-node
          # to write a .npmrc with proper authentication configuration
          registry-url: 'https://registry.npmjs.org'

      - name: Download and publish NPM tarballs
        run: |
          VERSION="${RELEASE_TAG#v}"

          PACKAGES=("taskcluster-client-${VERSION}.tgz" "taskcluster-client-web-${VERSION}.tgz")

          for PACKAGE in "${PACKAGES[@]}"; do
            FOUND=""
            # Retry loop: assets may still be uploading when the release event fires
            for ATTEMPT in 1 2 3 4 5; do
              FOUND=$(gh release view "$RELEASE_TAG" --repo taskcluster/taskcluster --json assets --jq ".assets[] | select(.name == \"${PACKAGE}\") | .name" 2>/dev/null || true)
              if [ -n "$FOUND" ]; then
                break
              fi
              echo "Attempt ${ATTEMPT}: ${PACKAGE} not found yet, waiting 30s..."
              sleep 30
            done

            if [ -z "$FOUND" ]; then
              echo "ERROR: ${PACKAGE} not found after 5 attempts"
              exit 1
            fi

            gh release download "$RELEASE_TAG" --repo taskcluster/taskcluster --pattern "$PACKAGE"

            npm publish "$PACKAGE" --provenance --access public
          done
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
