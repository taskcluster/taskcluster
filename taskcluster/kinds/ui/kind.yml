---
loader: taskgraph.loader.transform:loader

transforms:
  - src.transforms:add_task_env
  - taskgraph.transforms.run
  - taskgraph.transforms.task

task-defaults:
  worker-type: ubuntu-24-04
  run:
    using: bare
  worker:
    docker-image: {in-tree: browser-test}
    chain-of-trust: true
    caches:
      - name: taskcluster
        mount-point: /builds/worker/checkouts
    max-run-time: 600

tasks:
  lint-test-build:
    description: UI lint, unit tests, and production build
    run:
      command: >-
        {{ corepack yarn --immutable &> /dev/null || exit 99; }} &&
        cd ui &&
        {{ corepack yarn --immutable &> /dev/null || exit 99; }} &&
        corepack yarn lint &&
        corepack yarn test &&
        corepack yarn build
  smoke:
    description: UI Playwright smoke
    worker:
      artifacts:
        - name: public/smoke-screenshots
          path: /builds/worker/checkouts/taskcluster/ui/smoke-screenshots
          type: directory
        - name: public/playwright-report
          path: /builds/worker/checkouts/taskcluster/ui/playwright-report
          type: directory
    run:
      command: >-
        cd ui &&
        {{ corepack yarn --immutable &> /dev/null || exit 99; }} &&
        corepack yarn smoke
