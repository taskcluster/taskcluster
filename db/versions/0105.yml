migrationScript: 0105-migration.sql
downgradeScript: 0105-downgrade.sql

methods:
  queue_claimed_tasks_count_test:
    description: |
      Count the number of claimed tasks for given task queue.
    mode: read
    serviceName: queue
    args: task_queue_id_in text
    returns: integer
    body: |-
      begin
        return (
          select count(*)
          from queue_claimed_tasks
          where task_queue_id = task_queue_id_in
            and taken_until > now()
        );
      end
