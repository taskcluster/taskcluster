    delete from queue_task_deadlines q1
    using queue_task_deadlines q2
    where q1.task_id = q2.task_id
      and (q1.created, q1.deadline, q1.ctid) < (q2.created, q2.deadline, q2.ctid);

    alter table queue_task_deadlines drop constraint if exists queue_task_deadlines_pkey;
    drop index if exists queue_task_deadline_idx;
    alter table queue_task_deadlines add primary key (task_id);
  end
