apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ${routeName}
  labels: {$eval: labels}
spec:
  parentRefs:
  - name: taskcluster-gateway
    sectionName: https
  hostnames:
  - '{{ substr 8 -1 (trimSuffix "/" .Values.rootUrl) }}'
  rules:
    $map: {$eval: ingresses}
    each(i):
      matches:
      - path:
          type: PathPrefix
          value: ${i.pathPrefix}
      backendRefs:
      - name: ${i.projectName}
        port: 80
