apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: taskcluster-tls-redirect
  labels: {$eval: labels}
spec:
  parentRefs:
  - name: taskcluster-gateway
    sectionName: http
  hostnames:
  - '{{ substr 8 -1 (trimSuffix "/" .Values.rootUrl) }}'
  rules:
  - filters:
    - type: RequestRedirect
      requestRedirect:
        scheme: https
