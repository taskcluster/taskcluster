{{- if and (eq (.Values.ingressType | default "") "gateway") (not (has "httproute" .Values.skipResourceTypes)) -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: taskcluster-tls-redirect
  labels:
    app.kubernetes.io/name: taskcluster-tls-redirect
    app.kubernetes.io/instance: '{{ .Release.Name }}'
    app.kubernetes.io/component: taskcluster-tls-redirect-httproute
    app.kubernetes.io/part-of: taskcluster
spec:
  parentRefs:
    - name: taskcluster-gateway
      sectionName: http
  hostnames:
    - '{{ substr 8 -1 (trimSuffix "/" .Values.rootUrl) }}'
  rules:
    - filters:
        - type: RequestRedirect
          requestRedirect:
            scheme: https
{{- end }}
